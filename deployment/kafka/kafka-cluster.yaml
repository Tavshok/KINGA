---
# Kafka Users
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  name: kinga-monolith
  namespace: kafka
  labels:
    strimzi.io/cluster: kinga-kafka
spec:
  authentication:
    type: scram-sha-512
  authorization:
    type: simple
    acls:
      # Allow publishing to all topics
      - resource:
          type: topic
          name: "*"
          patternType: literal
        operations: [Write, Create, Describe]
      # Allow consuming from all topics
      - resource:
          type: topic
          name: "*"
          patternType: literal
        operations: [Read, Describe]
      # Allow consumer group management
      - resource:
          type: group
          name: kinga-monolith
          patternType: prefix
        operations: [Read]

---
apiVersion: kafka.strimzi.io/v1beta2
kind: KafkaUser
metadata:
  name: notification-service
  namespace: kafka
  labels:
    strimzi.io/cluster: kinga-kafka
spec:
  authentication:
    type: scram-sha-512
  authorization:
    type: simple
    acls:
      # Allow consuming from all topics
      - resource:
          type: topic
          name: "*"
          patternType: literal
        operations: [Read, Describe]
      # Allow publishing to notification topics
      - resource:
          type: topic
          name: notification
          patternType: prefix
        operations: [Write, Create, Describe]
      # Allow consumer group management
      - resource:
          type: group
          name: notification-service
          patternType: prefix
        operations: [Read]
