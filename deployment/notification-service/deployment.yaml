---
apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
  namespace: kinga-services
data:
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_SECURE: "false"
  SMTP_FROM: "noreply@kinga.ai"
  LOG_LEVEL: "info"

---
apiVersion: v1
kind: Secret
metadata:
  name: notification-service-secrets
  namespace: kinga-services
type: Opaque
stringData:
  SMTP_USER: "your-smtp-username"
  SMTP_PASS: "your-smtp-password"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: kinga-services
  labels:
    app: notification-service
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
        version: v1
        monitoring: enabled
    spec:
      containers:
      - name: notification-service
        image: kinga/notification-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
          name: http
          protocol: TCP
        env:
        # Kafka configuration
        - name: KAFKA_BROKERS
          value: "kinga-kafka-kafka-bootstrap.kafka:9093"
        - name: KAFKA_CLIENT_ID
          value: "notification-service"
        - name: KAFKA_SASL_MECHANISM
          value: "scram-sha-512"
        - name: KAFKA_SASL_USERNAME
          valueFrom:
            secretKeyRef:
              name: kafka-credentials
              key: username
        - name: KAFKA_SASL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: kafka-credentials
              key: password
        - name: KAFKA_SSL
          value: "true"
        - name: KAFKA_ENABLED
          value: "true"
        
        # SMTP configuration
        - name: SMTP_HOST
          valueFrom:
            configMapKeyRef:
              name: notification-service-config
              key: SMTP_HOST
        - name: SMTP_PORT
          valueFrom:
            configMapKeyRef:
              name: notification-service-config
              key: SMTP_PORT
        - name: SMTP_SECURE
          valueFrom:
            configMapKeyRef:
              name: notification-service-config
              key: SMTP_SECURE
        - name: SMTP_FROM
          valueFrom:
            configMapKeyRef:
              name: notification-service-config
              key: SMTP_FROM
        - name: SMTP_USER
          valueFrom:
            secretKeyRef:
              name: notification-service-secrets
              key: SMTP_USER
        - name: SMTP_PASS
          valueFrom:
            secretKeyRef:
              name: notification-service-secrets
              key: SMTP_PASS
        
        # Logging
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: notification-service-config
              key: LOG_LEVEL
        
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /ready
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "sleep 15"]
      
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: kinga-services
  labels:
    app: notification-service
    monitoring: enabled
spec:
  selector:
    app: notification-service
  ports:
  - name: http
    port: 80
    targetPort: 3001
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 3001
    protocol: TCP
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: notification-service-hpa
  namespace: kinga-services
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: notification-service
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: notification-service-pdb
  namespace: kinga-services
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: notification-service
