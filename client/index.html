<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>KINGA</title>
    
    <!-- Favicon and Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="https://files.manuscdn.com/user_upload_by_module/session_file/310419663031527958/NQQleUxbQjicslKt.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="https://files.manuscdn.com/user_upload_by_module/session_file/310419663031527958/qhWzUkMrpssMxNWK.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#10b981" />
    
    <!-- KINGA Design Prompt v2: Helvetica / system-ui for body; Courier New for monospace -->
    <style>
      /* Apply Helvetica/system-ui globally as per KINGA Design Prompt v2 */
      :root {
        --font-sans: Helvetica, Arial, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        --font-mono: 'Courier New', Courier, monospace;
      }
      body {
        font-family: var(--font-sans);
        font-weight: 400;
      }
      /* Monospace: SHA-256 hash, document identity strip, run IDs */
      .font-mono, code, pre, .mono,
      .report-hash, .report-run-id, .report-identity {
        font-family: var(--font-mono) !important;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
